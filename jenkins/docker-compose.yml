version: '3.8'

services:

  jenkins:

    build:
      context: .
      dockerfile: Dockerfile.jenkins

    container_name: jenkins

    user: root

    ports:
      - "8080:8080"
      - "50000:50000"

    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

    restart: always

volumes:
  jenkins_home: