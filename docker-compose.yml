version: '3.8'

services:
  # Selenium Hub - coordinates all nodes
  selenium-hub:
    image: selenium/hub:4.21.0
    container_name: selenium-hub
    ports:
      - "4444:4444"
      - "4442:4442"
      - "4443:4443"
    environment:
      SE_SESSION_REQUEST_TIMEOUT: 300
      # SE_NODE_MAX_SESSIONS: 5
      # SE_NODE_SESSION_TIMEOUT: 300
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:4444/wd/hub/status"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
    networks:
      - selenium-grid

  # Chrome Node 1
  chrome-node-1:
    image: selenium/node-chrome:4.21.0
    container_name: chrome-node-1
    depends_on:
      - selenium-hub
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
      SE_NODE_MAX_SESSIONS: 2
      SE_NODE_SESSION_TIMEOUT: 300
      SE_VNC_NO_VNCAT: true
      SE_JAVA_OPTS: "-Xmx512m"
      SE_NODE_OVERRIDE_MAX_SESSIONS: true
    ports:
      - "7900:7900"  # VNC port for debugging (optional)
    shm_size: 2gb
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:5555/wd/hub/status"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
    networks:
      - selenium-grid

  # Chrome Node 2
  chrome-node-2:
    image: selenium/node-chrome:4.21.0
    container_name: chrome-node-2
    depends_on:
      - selenium-hub
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
      SE_NODE_MAX_SESSIONS: 2
      SE_NODE_SESSION_TIMEOUT: 300
      SE_VNC_NO_VNCAT: true
      SE_JAVA_OPTS: "-Xmx512m"
      SE_NODE_OVERRIDE_MAX_SESSIONS: true
    ports:
      - "7901:7900"  # VNC port for debugging (optional)
    shm_size: 2gb
    networks:
      - selenium-grid
    
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:5555/wd/hub/status"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
